<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKC</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

  <!-- 🏠 HOME -->
  <div id="home" class="screen">

    <div class="header">
      <img src="logo.png" class="logo" alt="AKC logo">
      <h1>AKC PRO</h1>
    </div>

    <div class="menu">

      <button class="btn cargas" onclick="openScreen('cargas')">
        📊 Carga semanal y sistemas
      </button>

      <button class="btn" onclick="openScreen('fuerza')">
        💪 Fuerza, prevención y orientación
      </button>

      <button class="btn" onclick="openScreen('rutinas')">
        📘 Rutinas NP
      </button>

      <button class="btn" onclick="openScreen('trabajo')">
        🎯 Trabajo específico por elementos
      </button>

      <button class="btn" onclick="openScreen('basicos')">
        🔰 Básicos
      </button>

      <button class="btn calendar-btn" onclick="openScreen('calendar')">
        📅 Calendario
      </button>

      <button class="btn drive" onclick="openScreen('drive')">
        📂 Archivos / OneDrive
      </button>

    </div>

  </div>

  <!-- 📺 VIEWER -->
  <div id="viewerScreen" class="screen">

    <button class="back" onclick="goHome()">← Volver</button>

    <iframe id="viewerFrame" loading="lazy"></iframe>

  </div>

  <!-- 📅 CALENDARIO -->
  <div id="calendarScreen" class="screen">

    <button class="back" onclick="goHome()">← Volver</button>

    <iframe 
      src="https://calendar.google.com/calendar/embed?src=a2329715397da169f4918dafb153aab9ad464eb1b23ff58214249d7e5811e354%40group.calendar.google.com&ctz=America%2FMexico_City"
      loading="lazy">
    </iframe>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
