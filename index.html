<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKC</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <div id="home" class="screen active fade">
    <div class="header">
      <img src="logo.png" class="logo">
      <h1>AKC PRO</h1>
    </div>

    <div class="menu">
      <button class="btn big cargas" onclick="openScreen('cargas')">📊 Carga semanal y sistemas</button>
      <button class="btn big" onclick="openScreen('fuerza')">💪 Fuerza</button>
      <button class="btn big" onclick="openScreen('rutinas')">📘 Rutinas</button>
      <button class="btn big" onclick="openScreen('trabajo')">🎯 Trabajo</button>
      <button class="btn big" onclick="openScreen('basicos')">🔰 Básicos</button>
      <button class="btn big calendar-btn" onclick="openScreen('calendar')">📅 Calendario</button>
      <button class="btn big drive" onclick="openScreen('drive')">📂 Drive</button>
    </div>
  </div>

  <div id="viewerScreen" class="screen">
    <button class="back" onclick="goHome()">← Volver</button>
    <iframe id="viewerFrame"></iframe>
  </div>

  <div id="calendarScreen" class="screen">
    <button class="back" onclick="goHome()">← Volver</button>
    <iframe src="https://calendar.google.com/calendar/embed?ctz=America%2FMexico_City"></iframe>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
